spring:
  application:
    name: campusfit-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campusfit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:campusfit}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me_in_production}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /

app:
  encryption-key: ${APP_ENCRYPTION_KEY}
  session:
    timeout-minutes: ${APP_SESSION_TIMEOUT_MINUTES:30}
  lockout:
    max-attempts: ${APP_LOCKOUT_ATTEMPTS:5}
    duration-minutes: ${APP_LOCKOUT_DURATION_MINUTES:15}
  export:
    retention-days: ${EXPORT_RETENTION_DAYS:30}
  notification:
    email-enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
    sms-enabled: ${NOTIFICATION_SMS_ENABLED:false}
    wecom-enabled: ${NOTIFICATION_WECOM_ENABLED:false}
  pagination:
    default-size: 25
    max-size: 100

logging:
  level:
    com.campusfit: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
