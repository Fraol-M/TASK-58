components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UUID
      description: Session token obtained from /api/auth/sign-in

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Page number (zero-based)
    SizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Number of items per page

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ─── Shared ────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: string

    ApiResponseVoid:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
        error:
          type: string
          nullable: true

    PageResponse:
      type: object
      properties:
        content:
          type: array
          items: {}
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    # ─── Auth Schemas ──────────────────────────────────────────────
    SignUpRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
        email:
          type: string
          format: email
        phone:
          type: string
        role:
          type: string
          default: REGULAR_USER

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserDto'
        expiresAt:
          type: string
          format: date-time

    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [ACTIVE, LOCKED, DISABLED, DELETED]

    ApiResponseUserDto:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/UserDto'
        error:
          type: string
          nullable: true

    ApiResponseLoginResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/LoginResponse'
        error:
          type: string
          nullable: true

    # ─── Fitness Schemas ───────────────────────────────────────────
    AssessmentRequest:
      type: object
      required:
        - heightFeet
        - heightInches
        - weightLbs
      properties:
        heightFeet:
          type: integer
          minimum: 1
          maximum: 8
        heightInches:
          type: integer
          minimum: 0
          maximum: 11
        weightLbs:
          type: number
          format: double
          exclusiveMinimum: true
          minimum: 0
        bodyFatPercent:
          type: number
          format: double
        waist:
          type: number
          format: double
        chest:
          type: number
          format: double
        arm:
          type: number
          format: double
        notes:
          type: string

    AssessmentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        assessmentType:
          type: string
        heightFeet:
          type: integer
        heightInches:
          type: integer
        formattedHeight:
          type: string
        weightLbs:
          type: number
          format: double
        bodyFatPercent:
          type: number
          format: double
          nullable: true
        waistInches:
          type: number
          format: double
          nullable: true
        chestInches:
          type: number
          format: double
          nullable: true
        armInches:
          type: number
          format: double
          nullable: true
        assessmentDate:
          type: string
          format: date
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApiResponseAssessmentResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/AssessmentResponse'
        error:
          type: string
          nullable: true

    GoalRequest:
      type: object
      required:
        - goalType
        - targetValue
        - unit
        - startDate
        - targetDate
      properties:
        goalType:
          type: string
          enum: [WEIGHT_LOSS, WEIGHT_GAIN, FLEXIBILITY, ENDURANCE, STRENGTH]
        description:
          type: string
        targetValue:
          type: number
          format: decimal
          exclusiveMinimum: true
          minimum: 0
        unit:
          type: string
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date

    GoalResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        assessmentId:
          type: integer
          format: int64
          nullable: true
        goalType:
          type: string
          enum: [WEIGHT_LOSS, WEIGHT_GAIN, FLEXIBILITY, ENDURANCE, STRENGTH]
        description:
          type: string
        targetValue:
          type: number
          format: decimal
        startValue:
          type: number
          format: decimal
        currentValue:
          type: number
          format: decimal
        unit:
          type: string
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
