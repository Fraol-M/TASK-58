openapi: 3.0.3
info:
  title: CampusFit API
  description: >-
    CampusFit platform API covering authentication, fitness tracking, study planning,
    inbound receipt management, master data administration, notifications, data export,
    and reporting.
  version: 1.0.0
  contact:
    name: CampusFit Team

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication and session management
  - name: Fitness
    description: Fitness assessments, goals, and check-ins
  - name: Study
    description: Study plans, daily completions, and forgetting points
  - name: Inbound
    description: Inbound receipt processing and warehouse operations
  - name: Admin
    description: Master data CRUD operations
  - name: MasterDataOps
    description: Master data import, merge, and change history
  - name: Notifications
    description: Notification management and delivery
  - name: Exports
    description: Data export and account management
  - name: Dashboard
    description: Reporting and performance dashboards

paths:
  # ─── Auth ───────────────────────────────────────────────────────────
  /api/auth/sign-up:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: signUp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/sign-in:
    post:
      tags: [Auth]
      summary: Authenticate and obtain a session token
      operationId: signIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/sign-out:
    post:
      tags: [Auth]
      summary: Invalidate the current session
      description: >
        Idempotent sign-out. Returns 200 whether or not a Bearer token is present.
        If a valid token is supplied it is invalidated; if absent or already invalid
        the call still succeeds. This avoids client-side errors on double-logout or
        expired-session scenarios.
      operationId: signOut
      responses:
        '200':
          description: Signed out successfully (or already signed out)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user
      operationId: getMe
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Fitness ────────────────────────────────────────────────────────
  /api/fitness/assessment:
    get:
      tags: [Fitness]
      summary: Get the latest fitness assessment
      operationId: getAssessment
      responses:
        '200':
          description: Assessment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAssessmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Fitness]
      summary: Create or update a fitness assessment
      operationId: updateAssessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssessmentRequest'
      responses:
        '200':
          description: Assessment saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAssessmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/fitness/goals:
    post:
      tags: [Fitness]
      summary: Create a fitness goal
      operationId: createGoal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoalRequest'
      responses:
        '201':
          description: Goal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGoalResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Fitness]
      summary: List fitness goals for the current user
      operationId: listGoals
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated list of goals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseGoalResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/fitness/goals/{id}:
    get:
      tags: [Fitness]
      summary: Get a specific fitness goal
      operationId: getGoal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Goal details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGoalResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/fitness/goals/{goalId}/check-ins:
    post:
      tags: [Fitness]
      summary: Create a check-in for a goal
      operationId: createCheckIn
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckInRequest'
      responses:
        '201':
          description: Check-in recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCheckInResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Fitness]
      summary: List check-ins for a goal
      operationId: listCheckIns
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of check-ins for the goal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListCheckInResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Study ──────────────────────────────────────────────────────────
  /api/study/plans:
    post:
      tags: [Study]
      summary: Create a study plan
      operationId: createStudyPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudyPlanRequest'
      responses:
        '201':
          description: Study plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStudyPlanResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Study]
      summary: List study plans
      operationId: listStudyPlans
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated list of study plans for the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseStudyPlanResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/study/plans/{id}:
    get:
      tags: [Study]
      summary: Get a specific study plan
      operationId: getStudyPlan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Study plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStudyPlanResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/study/plans/{planId}/completions:
    post:
      tags: [Study]
      summary: Record a daily completion
      operationId: createDailyCompletion
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyCompletionRequest'
      responses:
        '200':
          description: Completion recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDailyCompletionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Study]
      summary: List daily completions for a plan
      operationId: listDailyCompletions
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of completions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyCompletionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/study/plans/{planId}/forgetting-points:
    post:
      tags: [Study]
      summary: Create a forgetting point
      operationId: createForgettingPoint
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgettingPointRequest'
      responses:
        '200':
          description: Forgetting point created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseForgettingPointResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Study]
      summary: List forgetting points for a plan
      operationId: listForgettingPoints
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of forgetting points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ForgettingPointResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/study/forgetting-points/{id}/review:
    post:
      tags: [Study]
      summary: Review a forgetting point (spaced repetition)
      operationId: reviewForgettingPoint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
      responses:
        '200':
          description: Forgetting point reviewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseForgettingPointResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/study/export:
    get:
      tags: [Study]
      summary: Export study data as JSON
      operationId: exportStudyData
      responses:
        '200':
          description: Study data JSON payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStudyExportData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/study/import:
    post:
      tags: [Study]
      summary: Import study data from JSON
      operationId: importStudyData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudyExportData'
      responses:
        '200':
          description: Import successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Inbound ────────────────────────────────────────────────────────
  /api/inbound/receipts:
    post:
      tags: [Inbound]
      summary: Create an inbound receipt
      operationId: createInboundReceipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboundReceiptRequest'
      responses:
        '201':
          description: Receipt created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseInboundReceiptResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Inbound]
      summary: List inbound receipts
      operationId: listInboundReceipts
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated list of receipts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseInboundReceiptResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inbound/receipts/{id}:
    get:
      tags: [Inbound]
      summary: Get a specific inbound receipt
      operationId: getInboundReceipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Receipt details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseInboundReceiptResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inbound/receipts/{id}/transition:
    post:
      tags: [Inbound]
      summary: Transition receipt to a new state
      operationId: transitionReceipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionRequest'
      responses:
        '200':
          description: Transition successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseInboundReceiptResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inbound/receipts/{id}/receive:
    post:
      tags: [Inbound]
      summary: Update received quantity for a receipt line
      operationId: receiveLine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiveLineRequest'
      responses:
        '200':
          description: Received quantity updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseInboundLineResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inbound/receipts/{id}/lines:
    post:
      tags: [Inbound]
      summary: Add a line to an inbound receipt
      operationId: addInboundLine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboundLineRequest'
      responses:
        '201':
          description: Line added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseInboundLineResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inbound/receipts/{id}/inspection:
    post:
      tags: [Inbound]
      summary: Submit inspection results for a receipt line
      operationId: submitInspection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionRequest'
      responses:
        '200':
          description: Inspection recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseInboundLineResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inbound/receipts/{id}/discrepancies:
    get:
      tags: [Inbound]
      summary: List discrepancies for a receipt
      operationId: getDiscrepancies
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of discrepancies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListDiscrepancy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inbound/receipts/{id}/putaway:
    get:
      tags: [Inbound]
      summary: List putaway tasks for a receipt
      operationId: getPutawayTasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of putaway tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListPutawayTask'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Inbound]
      summary: Complete or generate putaway tasks
      operationId: completePutaway
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutawayRequest'
      responses:
        '200':
          description: Putaway tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListPutawayTask'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/inbound/receipts/{id}/post:
    post:
      tags: [Inbound]
      summary: Post receipt to inventory (finalize)
      operationId: postReceipt
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/inbound/receipts/{id}/unpost:
    post:
      tags: [Inbound]
      summary: Unpost receipt from inventory (admin only)
      operationId: unpostReceipt
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/inbound/receipts/{id}/supervisor-review:
    post:
      tags: [Inbound]
      summary: Supervisor review for discrepancies
      operationId: supervisorReview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                discrepancyId:
                  type: integer
                  format: int64
                reasonCode:
                  type: string
                notes:
                  type: string
              required:
                - discrepancyId
                - reasonCode
      responses:
        '200':
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Admin / Master Data CRUD ──────────────────────────────────────
  /api/admin/terms:
    get:
      tags: [Admin]
      summary: List all terms
      operationId: listTerms
      parameters:
